# AuraPOS — Nginx Wildcard Subdomain Config
# File ini: /etc/nginx/sites-available/aurapos
# Symlink: ln -s /etc/nginx/sites-available/aurapos /etc/nginx/sites-enabled/

# Ganti: YOUR_SERVER_IP dengan IP VPS kamu
# Ganti: /path/to/ssl jika pakai SSL

server {
    listen 80;
    listen [::]:80;

    # Tangkap root domain DAN semua subdomain sekaligus
    server_name aurapos.my.id *.aurapos.my.id;

    # Proxy ke app (port 5000 default AuraPOS)
    location / {
        proxy_pass         http://127.0.0.1:5000;

        # WAJIB: kirim Host header asli ke Express
        # Tanpa ini req.hostname = "localhost" bukan "thamada.aurapos.my.id"
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Real-IP         $remote_addr;

        # WebSocket support (untuk SSE/CFD)
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";

        proxy_read_timeout 86400;
    }
}

